apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-site-deployment
  labels:
    run: django-site
spec:
  selector:
    matchLabels:
      run: django-site
  template:
    metadata:
      labels:
        run: django-site
    spec:
      containers:
      - name: django-site
        image: django-test:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: secret-key
        - name: DEBUG
          value: "True"
        ports:
        - containerPort: 80
          protocol: TCP
      restartPolicy: Always


---
apiVersion: v1
kind: Service
metadata:
  name: django-site
  labels:
    run: django-site
  namespace: default
spec:
  selector:
    run: django-site
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: NodePort